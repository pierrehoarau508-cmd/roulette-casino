<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Casino Royal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#0a4a1a;--green-light:#0d6b27;--green-felt:#145a32;
  --gold:#D4A843;--gold-light:#F5D98B;--gold-dark:#7A5C1E;
  --red:#c0392b;--black:#111;--white:#f5f0e8;
  --team-red:#e74c3c;--team-blue:#3498db;--team-green:#2ecc71;--team-gold:#f1c40f;
}
html,body{width:100%;min-height:100vh;background:#0a0a0a;font-family:'Cormorant Garamond',serif;color:var(--white);overflow-x:hidden}

/* Layout */
#app{display:grid;grid-template-columns:280px 1fr 280px;grid-template-rows:auto 1fr auto;min-height:100vh;gap:0}
@media(max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:auto}}

/* Header */
header{grid-column:1/-1;background:linear-gradient(135deg,#0a0a0a,#1a0a00);border-bottom:2px solid var(--gold-dark);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--gold);text-shadow:0 0 30px rgba(212,168,67,0.5);letter-spacing:.05em}
.logo span{color:var(--white);font-weight:400}
.live-badge{display:flex;align-items:center;gap:8px;font-size:.7rem;letter-spacing:.3em;color:var(--gold-dark);text-transform:uppercase}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 10px #4ade80;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Panneau gauche — Équipes & Scores */
#panel-left{background:#0d0d0d;border-right:1px solid rgba(212,168,67,0.15);padding:1.5rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto}
.panel-title{font-family:'Playfair Display',serif;font-size:.9rem;letter-spacing:.2em;color:var(--gold-dark);text-transform:uppercase;border-bottom:1px solid rgba(212,168,67,0.2);padding-bottom:.5rem}

.team-card{border-radius:4px;padding:1rem;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);cursor:pointer;transition:all .2s}
.team-card:hover{border-color:rgba(212,168,67,0.4);background:rgba(212,168,67,0.05)}
.team-card.selected{border-color:var(--gold);background:rgba(212,168,67,0.1)}
.team-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:.4rem}
.team-stats{display:flex;justify-content:space-between;font-size:.75rem;color:rgba(255,255,255,0.5)}
.team-jetons{color:var(--gold);font-weight:600}
.team-membres{font-size:.65rem;color:rgba(255,255,255,0.3);margin-top:.3rem}
.score-bar{height:3px;border-radius:2px;margin-top:.5rem;transition:width .5s}

.join-form{display:flex;flex-direction:column;gap:.5rem}
.join-form input{background:rgba(255,255,255,0.05);border:1px solid rgba(212,168,67,0.2);border-radius:3px;padding:.5rem .8rem;color:var(--white);font-family:inherit;font-size:.85rem}
.join-form input:focus{outline:none;border-color:var(--gold)}
.btn{padding:.5rem 1rem;border:none;border-radius:3px;cursor:pointer;font-family:'Playfair Display',serif;font-size:.8rem;letter-spacing:.1em;transition:all .2s;text-transform:uppercase}
.btn-gold{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#1a0a00;font-weight:700}
.btn-gold:hover{filter:brightness(1.2)}
.btn-gold:disabled{opacity:.4;cursor:not-allowed}

/* Centre — Roulette */
#panel-center{background:var(--green);display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:1.5rem;position:relative;overflow:hidden}
#panel-center::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,0.08),transparent 60%);pointer-events:none}

.roulette-wrap{position:relative;width:min(360px,80vw);height:min(360px,80vw)}
#roulette-canvas{width:100%;height:100%;border-radius:50%;box-shadow:0 0 60px rgba(0,0,0,0.8),0 0 0 4px var(--gold-dark),0 0 0 8px #1a0a00,0 0 0 10px var(--gold-dark)}
.roulette-needle{position:absolute;top:50%;left:-18px;transform:translateY(-50%);width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:32px solid var(--gold);filter:drop-shadow(0 0 8px var(--gold));z-index:10}
.roulette-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;background:radial-gradient(circle,#f5d98b,#7a5c1e);border:2px solid #1a0a00;box-shadow:0 0 20px rgba(212,168,67,0.5);z-index:5}

/* Résultat */
.result-display{text-align:center}
.result-number{font-family:'Playfair Display',serif;font-size:4rem;font-weight:900;line-height:1;min-height:5rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.result-number.red{color:var(--team-red);text-shadow:0 0 30px rgba(231,76,60,0.6)}
.result-number.black{color:#aaa;text-shadow:0 0 30px rgba(170,170,170,0.3)}
.result-number.zero{color:var(--team-green);text-shadow:0 0 30px rgba(46,204,113,0.6)}
.comment-ia{font-style:italic;font-size:.95rem;color:var(--gold-light);max-width:400px;text-align:center;min-height:2rem;opacity:.9}

/* Tableau de mise */
.bet-table{width:100%;max-width:500px}
.bet-row{display:flex;gap:.3rem;margin-bottom:.3rem;justify-content:center}
.bet-cell{flex:1;padding:.4rem .2rem;text-align:center;border-radius:2px;cursor:pointer;font-size:.7rem;font-family:'Playfair Display',serif;font-weight:700;border:1px solid rgba(255,255,255,0.1);transition:all .15s;user-select:none;max-width:60px}
.bet-cell:hover{filter:brightness(1.3);border-color:var(--gold)}
.bet-cell.selected{box-shadow:0 0 0 2px var(--gold);filter:brightness(1.3)}
.bet-cell.red-cell{background:var(--red);color:#fff}
.bet-cell.black-cell{background:#222;color:#fff}
.bet-cell.green-cell{background:#1a6b2a;color:#fff}
.bet-cell.outside{background:rgba(212,168,67,0.15);color:var(--gold-light);border-color:rgba(212,168,67,0.3)}

.bet-controls{display:flex;align-items:center;gap:.5rem;justify-content:center;flex-wrap:wrap}
.chip{width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:.7rem;font-weight:700;border:3px solid rgba(255,255,255,0.3);transition:all .2s;display:flex;align-items:center;justify-content:center}
.chip:hover{transform:scale(1.15)}
.chip.c10{background:#e74c3c}
.chip.c50{background:#3498db}
.chip.c100{background:#2ecc71}
.chip.c500{background:#f1c40f;color:#1a0a00}
.chip.selected{box-shadow:0 0 0 3px var(--gold),0 0 15px var(--gold)}
.current-bet{font-size:.75rem;color:var(--gold);letter-spacing:.1em}

/* Panneau droit — Chat */
#panel-right{background:#0d0d0d;border-left:1px solid rgba(212,168,67,0.15);display:flex;flex-direction:column;padding:0}
#chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.4rem;max-height:calc(100vh - 200px)}
.chat-msg{font-size:.8rem;line-height:1.4;padding:.3rem .5rem;border-radius:2px}
.chat-msg.ia{background:rgba(212,168,67,0.08);border-left:2px solid var(--gold);color:var(--gold-light)}
.chat-msg.player{background:rgba(255,255,255,0.03)}
.chat-name{font-weight:700;margin-right:.3rem}
.chat-name.red{color:var(--team-red)}
.chat-name.blue{color:var(--team-blue)}
.chat-name.green{color:var(--team-green)}
.chat-name.gold{color:var(--team-gold)}
.chat-time{font-size:.65rem;color:rgba(255,255,255,0.3);float:right}
#chat-input-wrap{display:flex;gap:.5rem;padding:.8rem;border-top:1px solid rgba(212,168,67,0.15)}
#chat-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(212,168,67,0.2);border-radius:3px;padding:.4rem .7rem;color:var(--white);font-family:inherit;font-size:.8rem}
#chat-input:focus{outline:none;border-color:var(--gold)}

/* Historique */
.history{display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center}
.hist-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;font-family:'Playfair Display',serif}
.hist-num.r{background:var(--red)}
.hist-num.b{background:#333;border:1px solid #555}
.hist-num.z{background:#1a6b2a}

/* Spin btn */
#spin-btn{padding:.8rem 2.5rem;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;letter-spacing:.15em;background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-dark));color:#1a0a00;border:none;border-radius:2px;cursor:pointer;text-transform:uppercase;box-shadow:0 4px 20px rgba(212,168,67,0.3);transition:all .2s}
#spin-btn:hover:not(:disabled){filter:brightness(1.2);transform:translateY(-1px)}
#spin-btn:disabled{opacity:.4;cursor:not-allowed}

/* Toast */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.95);border:1px solid var(--gold-dark);padding:.6rem 1.5rem;border-radius:3px;font-size:.8rem;color:var(--white);opacity:0;transition:opacity .3s;pointer-events:none;z-index:1000}
#toast.show{opacity:1}

/* Recap overlay */
#recap{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:500}
#recap.show{display:flex}
.recap-box{background:#111;border:2px solid var(--gold);padding:2rem;border-radius:4px;max-width:400px;width:90%;text-align:center}
.recap-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);margin-bottom:1rem}
.recap-line{display:flex;justify-content:space-between;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:.9rem}
.gain{color:#2ecc71}
.perte{color:#e74c3c}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Casino <span>Royal</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:.3rem">
      <div class="live-badge"><span class="dot"></span><span id="liveStatus">Connexion…</span></div>
      <div id="spin-counter" style="font-size:.65rem;color:var(--gold-dark);letter-spacing:.2em"></div>
    </div>
    <div id="player-info" style="font-size:.8rem;color:var(--gold-dark);text-align:right"></div>
  </header>

  <!-- Panneau gauche -->
  <div id="panel-left">
    <div class="panel-title">Équipes</div>
    <div id="teams-list"></div>
    <div class="panel-title" style="margin-top:.5rem">Rejoindre</div>
    <div class="join-form">
      <input id="player-name" type="text" placeholder="Ton prénom" maxlength="20">
      <select id="team-select" style="background:rgba(255,255,255,0.05);border:1px solid rgba(212,168,67,0.2);border-radius:3px;padding:.5rem;color:var(--white);font-family:inherit">
        <option value="">Choisir une équipe</option>
        <option value="🔴 Rouge">🔴 Rouge</option>
        <option value="🔵 Bleu">🔵 Bleu</option>
        <option value="🟢 Vert">🟢 Vert</option>
        <option value="🟡 Or">🟡 Or</option>
      </select>
      <button class="btn btn-gold" onclick="joinTeam()">Rejoindre</button>
    </div>
    <div class="panel-title" style="margin-top:.5rem">Historique</div>
    <div id="history" class="history"></div>
  </div>

  <!-- Centre -->
  <div id="panel-center">
    <div class="roulette-wrap">
      <canvas id="roulette-canvas" width="500" height="500"></canvas>
      <div class="roulette-needle"></div>
      <div class="roulette-center"></div>
    </div>
    <div class="result-display">
      <div class="result-number" id="result-number">—</div>
      <div class="comment-ia" id="comment-ia">Faites vos jeux…</div>
    </div>
    <div class="bet-controls">
      <div class="chip c10"  onclick="selectChip(10)"  id="chip-10">10</div>
      <div class="chip c50"  onclick="selectChip(50)"  id="chip-50">50</div>
      <div class="chip c100" onclick="selectChip(100)" id="chip-100">100</div>
      <div class="chip c500" onclick="selectChip(500)" id="chip-500">500</div>
      <span class="current-bet" id="current-bet-display"></span>
    </div>
    <div class="bet-table" id="bet-table"></div>
    <button id="spin-btn" onclick="requestSpin()">🎰 Lancer la roulette</button>
  </div>

  <!-- Chat -->
  <div id="panel-right">
    <div style="padding:.8rem 1rem;border-bottom:1px solid rgba(212,168,67,0.15)">
      <div class="panel-title" style="border:none;padding:0">Chat</div>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-wrap">
      <input id="chat-input" placeholder="Message…" maxlength="200" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn btn-gold" onclick="sendChat()">↵</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="recap" onclick="this.classList.remove('show')">
  <div class="recap-box" onclick="event.stopPropagation()">
    <div class="recap-title">🎰 Résultats des mises</div>
    <div id="recap-content"></div>
    <button class="btn btn-gold" style="margin-top:1rem;width:100%" onclick="document.getElementById('recap').classList.remove('show')">Fermer</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── Config roulette ────────────────────────────────────────────────
const NUMBERS = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const RED_N   = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const SEG     = 360 / 37;

function numColor(n){ return n===0?'#1a6b2a':RED_N.has(n)?'#c0392b':'#111' }

// ── Canvas roulette ────────────────────────────────────────────────
const canvas = document.getElementById('roulette-canvas');
const ctx    = canvas.getContext('2d');
const SZ=500, cx=250, cy=250, R=240, innerR=60;

function drawRoulette(angleDeg) {
  ctx.clearRect(0,0,SZ,SZ);
  const a = angleDeg * Math.PI / 180;
  for(let i=0;i<37;i++){
    const start = a + i*(Math.PI*2/37);
    const end   = start + Math.PI*2/37;
    // Couleur
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,start,end); ctx.closePath();
    ctx.fillStyle = numColor(NUMBERS[i]); ctx.fill();
    ctx.strokeStyle='rgba(212,168,67,0.4)'; ctx.lineWidth=1; ctx.stroke();
    // Séparateurs or
    ctx.beginPath(); ctx.moveTo(cx+Math.cos(start)*innerR,cy+Math.sin(start)*innerR);
    ctx.lineTo(cx+Math.cos(start)*R,cy+Math.sin(start)*R);
    ctx.strokeStyle='rgba(212,168,67,0.6)'; ctx.lineWidth=1.5; ctx.stroke();
    // Numéro
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(start + Math.PI/37);
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font='bold 10px "Playfair Display",serif';
    ctx.fillText(NUMBERS[i], R-8, 4);
    ctx.restore();
  }
  // Bord doré
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='#D4A843'; ctx.lineWidth=5; ctx.stroke();
  // Anneau intérieur
  ctx.beginPath(); ctx.arc(cx,cy,innerR,0,Math.PI*2);
  ctx.fillStyle='#0a0a0a'; ctx.fill();
  ctx.strokeStyle='#D4A843'; ctx.lineWidth=3; ctx.stroke();
  // Décoration centre
  ctx.beginPath(); ctx.arc(cx,cy,innerR-8,0,Math.PI*2);
  ctx.strokeStyle='rgba(212,168,67,0.3)'; ctx.lineWidth=1; ctx.stroke();
}

// ── Animation ─────────────────────────────────────────────────────
let angle = 0, spinning = false;

function animateSpin(finalAngle, onDone) {
  const start  = angle;
  const total  = finalAngle - start;
  if(total <= 0){ onDone(); return; }
  const dur = 7000;
  const t0  = performance.now();
  function ease(t){ return 1 - Math.pow(1-t, 5); }
  function frame(now){
    const p = Math.min((now-t0)/dur,1);
    angle = start + total * ease(p);
    drawRoulette(angle);
    if(p < 1) requestAnimationFrame(frame);
    else { angle = finalAngle; drawRoulette(angle); onDone(); }
  }
  requestAnimationFrame(frame);
}

// ── État local ────────────────────────────────────────────────────
let myTeam = null, myName = null, selectedChip = 10, selectedBet = null;
let currentState = null;

// ── Tableau de mise ───────────────────────────────────────────────
function buildBetTable() {
  const t = document.getElementById('bet-table');
  // Numéros 1-36 + 0
  let html = '<div class="bet-row">';
  html += `<div class="bet-cell green-cell" onclick="placeBet('number','0')" title="0">0</div>`;
  html += '</div><div style="display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-bottom:.3rem">';
  for(let n=1;n<=36;n++){
    const col = RED_N.has(n)?'red-cell':'black-cell';
    html += `<div class="bet-cell ${col}" onclick="placeBet('number','${n}')">${n}</div>`;
  }
  html += '</div>';
  // Douzaines
  html += '<div class="bet-row">';
  ['1-12','13-24','25-36'].forEach(d => {
    html += `<div class="bet-cell outside" onclick="placeBet('dozen','${d}')">${d}</div>`;
  });
  html += '</div>';
  // Rouge/Noir/Pair/Impair
  html += '<div class="bet-row">';
  [['color','rouge','🔴 Rouge'],['color','noir','⚫ Noir'],['parity','pair','PAIR'],['parity','impair','IMPAIR']].forEach(([type,val,label]) => {
    html += `<div class="bet-cell outside" onclick="placeBet('${type}','${val}')">${label}</div>`;
  });
  html += '</div>';
  t.innerHTML = html;
}

function selectChip(v) {
  selectedChip = v;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('chip-'+v).classList.add('selected');
  document.getElementById('current-bet-display').textContent = `Mise : ${v} jetons`;
}

function placeBet(type, value) {
  socket.emit('place-bet', { type, value, amount: selectedChip });
  // Highlight visuel
  document.querySelectorAll('.bet-cell').forEach(c => c.classList.remove('selected'));
  event.target.classList.add('selected');
}

function requestSpin() {
  socket.emit('request-spin');
}

function joinTeam() {
  const name = document.getElementById('player-name').value.trim();
  const team = document.getElementById('team-select').value;
  if(!name) return toast('Entre ton prénom !');
  if(!team) return toast('Choisis une équipe !');
  myName = name; myTeam = team;
  socket.emit('join-team', { team, name });
  document.getElementById('player-info').innerHTML = `${name}<br><span style="color:var(--gold)">${team}</span>`;
}

// ── Socket.io ─────────────────────────────────────────────────────
const socket = io();

socket.on('connect',    ()=>{ document.getElementById('liveStatus').textContent='En direct' });
socket.on('disconnect', ()=>{ document.getElementById('liveStatus').textContent='Déconnecté' });

socket.on('state-update', data => {
  currentState = data;
  document.getElementById('spin-counter').textContent = `Spin #${data.spinCount}`;
  renderTeams(data.teams);
  renderHistory(data.history||[]);
  // Sync bouton avec état serveur
  if (!data.spinning) {
    spinning = false;
    document.getElementById('spin-btn').disabled = false;
  }
});

socket.on('spin-start', ({ finalAngle, result }) => {
  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result-number').className = 'result-number';
  document.getElementById('result-number').textContent = '…';
  document.getElementById('comment-ia').textContent = '🎰 La bille tourne…';
  animateSpin(finalAngle, () => {
    spinning = false;
    document.getElementById('spin-btn').disabled = false;
  });
});

socket.on('spin-result', ({ result, recap, comment }) => {
  const el = document.getElementById('result-number');
  el.textContent = result === 0 ? '🟢 0' : (RED_N.has(result) ? '🔴 ' : '⚫ ') + result;
  el.className = 'result-number ' + (result===0?'zero':RED_N.has(result)?'red':'black');
  document.getElementById('comment-ia').textContent = comment;
  document.getElementById('spin-btn').disabled = false;
  if(recap && Object.keys(recap).length) showRecap(result, recap);
});

socket.on('chat-history', msgs => {
  msgs.forEach(addChatMsg);
});

socket.on('chat-message', addChatMsg);

socket.on('bet-placed', ({ type, value, amount }) => {
  toast(`✅ Mise : ${amount} jetons sur ${value}`);
});

socket.on('error', msg => toast('❌ ' + msg));

// ── Chat ──────────────────────────────────────────────────────────
function sendChat() {
  const inp = document.getElementById('chat-input');
  const msg = inp.value.trim();
  if(!msg) return;
  socket.emit('chat-message', { message: msg });
  inp.value = '';
}

function addChatMsg({ name, message, type, team, time }) {
  const c = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + type;
  const teamClass = team.includes('Rouge')?'red':team.includes('Bleu')?'blue':team.includes('Vert')?'green':team.includes('Or')?'gold':'';
  div.innerHTML = `<span class="chat-time">${time}</span><span class="chat-name ${teamClass}">${name}</span>${message}`;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

// ── Rendu équipes ─────────────────────────────────────────────────
function renderTeams(teams) {
  const maxScore = Math.max(...Object.values(teams).map(t=>t.score), 1);
  const html = Object.entries(teams).map(([name, data]) => {
    const color = name.includes('Rouge')?'var(--team-red)':name.includes('Bleu')?'var(--team-blue)':name.includes('Vert')?'var(--team-green)':'var(--team-gold)';
    const pct   = Math.round(data.score/maxScore*100);
    const sel   = myTeam === name ? 'selected' : '';
    const membres = data.membres.map(m=>m.name).join(', ') || 'Aucun membre';
    return `<div class="team-card ${sel}" onclick="quickJoin('${name}')">
      <div class="team-name" style="color:${color}">${name}</div>
      <div class="team-stats">
        <span class="team-jetons">💰 ${data.jetons}</span>
        <span>🏆 ${data.score} pts</span>
      </div>
      <div class="score-bar" style="background:${color};width:${pct}%"></div>
      <div class="team-membres">${membres}</div>
    </div>`;
  }).join('');
  document.getElementById('teams-list').innerHTML = html;
}

function quickJoin(team) {
  document.getElementById('team-select').value = team;
}

function renderHistory(history) {
  const html = history.map(h => {
    const n = h.number;
    const cls = n===0?'z':RED_N.has(n)?'r':'b';
    return `<div class="hist-num ${cls}">${n}</div>`;
  }).join('');
  document.getElementById('history').innerHTML = html;
}

function showRecap(result, recap) {
  let html = '';
  Object.entries(recap).forEach(([team, data]) => {
    if(data.gain > 0 || data.perte > 0) {
      html += `<div class="recap-line"><span>${team}</span><span class="${data.gain>0?'gain':'perte'}">${data.gain>0?'+'+data.gain:'-'+data.perte} jetons</span></div>`;
    }
  });
  if(html) {
    document.getElementById('recap-content').innerHTML = html;
    document.getElementById('recap').classList.add('show');
  }
}

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────────────────────────
buildBetTable();
selectChip(10);
drawRoulette(0);
</script>
</body>
